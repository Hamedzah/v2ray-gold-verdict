name: Golden Verdict Pipeline

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Golden Verdict
        run: python src/main.py
      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add configs.txt sub.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update golden configs [skip ci]"
          git push
